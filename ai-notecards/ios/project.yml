name: AINotecards
options:
  bundleIdPrefix: com.ainotecards
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  AINotecards:
    type: application
    platform: iOS
    sources:
      - AINotecards
    info:
      path: AINotecards/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLName: com.ainotecards.app
            CFBundleURLSchemes:
              - ainotecards
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ainotecards.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: AINotecards/AINotecards.entitlements
