# Draft Render config for the copied Polsia sandbox.
# Keep this additive until the real Polsia repo exists.
services:
  - type: web
    name: ai-notecards-polsia
    runtime: node
    buildCommand: npm --prefix server ci && npm --prefix client ci && npm run build:client
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_DIST_PATH
        value: /opt/render/project/src/client/dist
